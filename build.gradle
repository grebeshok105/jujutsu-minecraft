plugins {
	id 'net.fabricmc.fabric-loom-remap' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

repositories {
	// Add repositories to retrieve artifacts from in here.
	// You should only use this when depending on other mods because
	// Loom adds the essential maven repositories to download Minecraft and libraries from automatically.
	// See https://docs.gradle.org/current/userguide/declaring_repositories.html
	// for more information about repositories.
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"jujutsumod" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}
}

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings loom.officialMojangMappings()
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API. This is technically optional, but you probably want it anyway.
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
}

tasks.register('testHairpinTimeline', JavaExec) {
	group = 'verification'
	description = 'Runs assertion-based tests for the Hairpin timeline model'
	dependsOn tasks.named('testClasses')
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'jujutsu.mod.fx.HairpinTimelineTest'
	jvmArgs '-ea'
}

tasks.register('testHairpinVisualProfile', JavaExec) {
	group = 'verification'
	description = 'Runs assertion-based tests for the Hairpin visual profile'
	dependsOn tasks.named('testClasses')
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'jujutsu.mod.fx.HairpinVisualProfileTest'
	jvmArgs '-ea'
}

tasks.register('testProjectSanity', JavaExec) {
	group = 'verification'
	description = 'Runs resource and side-separation sanity checks'
	dependsOn tasks.named('testClasses')
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'jujutsu.mod.ProjectSanityTest'
	jvmArgs '-ea'
}

tasks.register('testHairpinDebugLog', JavaExec) {
	group = 'verification'
	description = 'Runs assertion-based tests for the Hairpin debug switch'
	dependsOn tasks.named('testClasses')
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'jujutsu.mod.debug.HairpinDebugLogTest'
	jvmArgs '-ea'
}

tasks.register('testTargetResolver', JavaExec) {
	group = 'verification'
	description = 'Runs assertion-based tests for gameplay target resolution'
	dependsOn tasks.named('testClasses')
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'jujutsu.mod.combat.TargetResolverTest'
	jvmArgs '-ea'
}

tasks.register('testNobaraCombatStateManager', JavaExec) {
	group = 'verification'
	description = 'Runs assertion-based tests for Nobara combat state'
	dependsOn tasks.named('testClasses')
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'jujutsu.mod.character.nobara.NobaraCombatStateManagerTest'
	jvmArgs '-ea'
}

tasks.register('testHairpinGameplayService', JavaExec) {
	group = 'verification'
	description = 'Runs assertion-based tests for Hairpin gameplay math'
	dependsOn tasks.named('testClasses')
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'jujutsu.mod.character.nobara.HairpinGameplayServiceTest'
	jvmArgs '-ea'
}

tasks.named('check') {
	dependsOn tasks.named('testHairpinTimeline')
	dependsOn tasks.named('testHairpinVisualProfile')
	dependsOn tasks.named('testProjectSanity')
	dependsOn tasks.named('testHairpinDebugLog')
	dependsOn tasks.named('testTargetResolver')
	dependsOn tasks.named('testNobaraCombatStateManager')
	dependsOn tasks.named('testHairpinGameplayService')
}

processResources {
	def version = project.version
	inputs.property "version", version

	filesMatching("fabric.mod.json") {
		expand "version": version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

tasks.named('test') {
	failOnNoDiscoveredTests = false
}

java {
	// Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	def projectName = project.name
	inputs.property "projectName", projectName

	from("LICENSE") {
		rename { "${it}_$projectName"}
	}
}

// configure the maven publication
publishing {
	publications {
		create("mavenJava", MavenPublication) {
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
		// Notice: This block does NOT have the same function as the block in the top level.
		// The repositories here will be used for publishing your artifact, not for
		// retrieving dependencies.
	}
}
