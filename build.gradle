	description = 'Runs persistent character selection and starter-claim tests'
	dependsOn tasks.named('testClasses')
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'jujutsu.mod.character.CharacterPlayerStateTest'
	maxHeapSize = '128m'
	jvmArgs '-ea'
}

