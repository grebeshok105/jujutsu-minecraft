	dependsOn tasks.named('testCharacterPlayerState')
	dependsOn tasks.named('testProjectSanity')
	dependsOn tasks.named('testTargetResolver')
	dependsOn tasks.named('testProjectJjkNobaraProfile')
	dependsOn tasks.named('testNobaraRemnant')
	dependsOn tasks.named('testRemnantVisualType')
	dependsOn tasks.named('testNobaraRitual')
	dependsOn tasks.named('testNailAnchor')
	dependsOn tasks.named('testBlackFlash')
	dependsOn tasks.named('testCurseLinks')
	dependsOn tasks.named('testVfxCore')
	dependsOn tasks.named('testVfxTimeline')
	dependsOn tasks.named('testVfxQuality')
	dependsOn tasks.named('testVfxAnchor')
	dependsOn tasks.named('testVfxTime')
	dependsOn tasks.named('testHairpinChain')
	dependsOn tasks.named('testNailTrap')
	dependsOn tasks.named('testResonantMomentum')
	dependsOn tasks.named('testServerTimeDilation')
}

processResources {
	def version = project.version
	inputs.property "version", version
	exclude "source-assets/**"

	filesMatching("fabric.mod.json") {
		expand "version": version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

tasks.named('test') {
	failOnNoDiscoveredTests = false
}

java {
	// Loom will automatically attach sourcesJar to a RemapSourcesJar task and to the "build" task
	// if it is present.
	// If you remove this line, sources will not be generated.
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	def projectName = project.name
	inputs.property "projectName", projectName

	from("LICENSE") {
		rename { "${it}_$projectName"}
	}
}

// configure the maven publication
publishing {
	publications {
		create("mavenJava", MavenPublication) {
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
		// Notice: This block does NOT have the same function as the block in the top level.
		// The repositories here will be used for publishing your artifact, not for
		// retrieving dependencies.
	}
}
