<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Nobara Hairpin Visual Target</title>
	<style>
		:root {
			color-scheme: dark;
			--bg: #080206;
			--panel: #151014;
			--line: #39242c;
			--text: #f8f2ea;
			--muted: #b995a0;
			--crimson: #d7193f;
			--deep-red: #650012;
			--hot-pink: #ff4d7d;
			--impact: #f8f2ea;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			background: var(--bg);
			color: var(--text);
			font-family: Arial, Helvetica, sans-serif;
			letter-spacing: 0;
		}

		main {
			display: grid;
			grid-template-rows: minmax(0, 1fr) auto;
			min-height: 100vh;
		}

		.stage {
			position: relative;
			overflow: hidden;
			min-height: 420px;
			border-bottom: 1px solid var(--line);
		}

		canvas {
			display: block;
			width: 100%;
			height: 100%;
			min-height: 420px;
		}

		.status {
			position: absolute;
			left: 24px;
			bottom: 24px;
			display: grid;
			gap: 6px;
			pointer-events: none;
			text-shadow: 0 2px 16px #000;
		}

		.phase {
			font-size: 20px;
			font-weight: 700;
		}

		.time {
			color: var(--muted);
			font-size: 13px;
		}

		.controls {
			display: grid;
			grid-template-columns: auto 1fr auto;
			gap: 18px;
			align-items: center;
			padding: 14px 18px;
			background: var(--panel);
		}

		button {
			width: 38px;
			height: 38px;
			border: 1px solid var(--line);
			background: #21161c;
			color: var(--text);
			border-radius: 6px;
			font-size: 18px;
			cursor: pointer;
		}

		button:hover {
			border-color: var(--hot-pink);
		}

		.timeline {
			display: grid;
			grid-template-columns: 180fr 60fr 320fr 340fr 900fr;
			height: 18px;
			border: 1px solid var(--line);
			background: #0d080b;
			overflow: hidden;
		}

		.segment {
			position: relative;
			border-right: 1px solid #26151d;
		}

		.segment:last-child {
			border-right: 0;
		}

		.segment.active::after {
			content: "";
			position: absolute;
			inset: 0;
			background: var(--crimson);
			opacity: 0.42;
		}

		.legend {
			display: flex;
			gap: 14px;
			flex-wrap: wrap;
			color: var(--muted);
			font-size: 12px;
		}

		.legend span::before {
			content: "";
			display: inline-block;
			width: 8px;
			height: 8px;
			margin-right: 6px;
			background: var(--crimson);
		}

		@media (max-width: 700px) {
			.controls {
				grid-template-columns: auto 1fr;
			}

			.legend {
				grid-column: 1 / -1;
			}
		}
	</style>
</head>
<body>
<main>
	<section class="stage">
		<canvas id="scene" aria-label="Nobara Hairpin timing target"></canvas>
		<div class="status">
			<div class="phase" id="phase">Prep Freeze</div>
			<div class="time" id="time">0 ms / 1800 ms</div>
		</div>
	</section>
	<section class="controls">
		<button id="toggle" title="Play or pause">||</button>
		<div class="timeline" id="timeline">
			<div class="segment" data-phase="Prep Freeze"></div>
			<div class="segment" data-phase="Hammer Snap"></div>
			<div class="segment" data-phase="Nail Ignition"></div>
			<div class="segment" data-phase="Hairpin Bloom"></div>
			<div class="segment" data-phase="Afterglow"></div>
		</div>
		<div class="legend">
			<span>crimson core</span>
			<span>white impact</span>
			<span>red-black residue</span>
		</div>
	</section>
</main>
<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");
const phaseLabel = document.getElementById("phase");
const timeLabel = document.getElementById("time");
const toggle = document.getElementById("toggle");
const segments = [...document.querySelectorAll(".segment")];

const phases = [
	{ name: "Prep Freeze", start: 0, end: 180 },
	{ name: "Hammer Snap", start: 180, end: 240 },
	{ name: "Nail Ignition", start: 240, end: 560 },
	{ name: "Hairpin Bloom", start: 560, end: 900 },
	{ name: "Afterglow", start: 900, end: 1800 }
];
const total = 1800;
const colors = {
	crimson: "#d7193f",
	deepRed: "#650012",
	black: "#080206",
	impact: "#f8f2ea",
	hotPink: "#ff4d7d"
};

let running = true;
let start = performance.now();
let pausedAt = 0;

toggle.addEventListener("click", () => {
	running = !running;
	if (running) {
		start = performance.now() - pausedAt;
		toggle.textContent = "||";
	} else {
		pausedAt = elapsed();
		toggle.textContent = ">";
	}
});

function elapsed() {
	if (!running) return pausedAt;
	return (performance.now() - start) % total;
}

function resize() {
	const rect = canvas.getBoundingClientRect();
	const ratio = window.devicePixelRatio || 1;
	canvas.width = Math.max(1, Math.floor(rect.width * ratio));
	canvas.height = Math.max(1, Math.floor(rect.height * ratio));
	ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
}

window.addEventListener("resize", resize);
resize();

function currentPhase(ms) {
	return phases.find(phase => ms >= phase.start && ms < phase.end) || phases[phases.length - 1];
}

function phaseProgress(phase, ms) {
	return Math.max(0, Math.min(1, (ms - phase.start) / (phase.end - phase.start)));
}

function easeOut(value) {
	return 1 - Math.pow(1 - value, 3);
}

function draw() {
	const ms = elapsed();
	const phase = currentPhase(ms);
	const p = phaseProgress(phase, ms);
	const width = canvas.clientWidth;
	const height = canvas.clientHeight;
	const center = { x: width * 0.58, y: height * 0.5 };
	const nails = [
		{ x: center.x - 150, y: center.y - 82 },
		{ x: center.x + 118, y: center.y - 56 },
		{ x: center.x - 78, y: center.y + 96 },
		{ x: center.x + 88, y: center.y + 118 }
	];

	ctx.clearRect(0, 0, width, height);
	drawBackground(width, height, ms);
	drawNails(nails, center, phase, p);
	drawPhaseEffect(nails, center, phase, p, ms);
	drawImpactFrame(width, height, phase, p);
	updateLabels(phase, ms);
	requestAnimationFrame(draw);
}

function drawBackground(width, height, ms) {
	const gradient = ctx.createRadialGradient(width * 0.58, height * 0.5, 10, width * 0.58, height * 0.5, Math.max(width, height) * 0.7);
	gradient.addColorStop(0, "#1b0710");
	gradient.addColorStop(0.45, "#10060a");
	gradient.addColorStop(1, colors.black);
	ctx.fillStyle = gradient;
	ctx.fillRect(0, 0, width, height);

	ctx.strokeStyle = "rgba(215,25,63,0.09)";
	ctx.lineWidth = 1;
	for (let i = 0; i < 18; i++) {
		const y = (height * 0.18) + i * 28 + Math.sin(ms * 0.002 + i) * 4;
		ctx.beginPath();
		ctx.moveTo(0, y);
		ctx.lineTo(width, y - 80);
		ctx.stroke();
	}
}

function drawNails(nails, center, phase, progress) {
	for (const nail of nails) {
		const charged = phase.name !== "Prep Freeze" || progress > 0.35;
		const angle = Math.atan2(center.y - nail.y, center.x - nail.x);
		ctx.save();
		ctx.translate(nail.x, nail.y);
		ctx.rotate(angle);
		ctx.fillStyle = "#c9b6b8";
		ctx.fillRect(-22, -2, 44, 4);
		ctx.fillStyle = "#2b2224";
		ctx.fillRect(12, -3, 12, 6);
		if (charged) {
			ctx.shadowColor = colors.crimson;
			ctx.shadowBlur = 18;
			ctx.fillStyle = colors.crimson;
			ctx.fillRect(-18, -3, 30, 6);
		}
		ctx.restore();
	}
}

function drawPhaseEffect(nails, center, phase, progress, ms) {
	if (phase.name === "Prep Freeze") {
		const pull = easeOut(progress) * 18;
		for (const nail of nails) drawSpark(nail.x + (center.x - nail.x) * 0.03, nail.y + (center.y - nail.y) * 0.03, 5 + pull * 0.08, 0.45);
	}

	if (phase.name === "Hammer Snap") {
		drawSlash(center.x - 230, center.y - 120, center.x - 80, center.y - 20, 1 - progress);
	}

	if (phase.name === "Nail Ignition") {
		for (const nail of nails) {
			const x = nail.x + (center.x - nail.x) * progress;
			const y = nail.y + (center.y - nail.y) * progress;
			drawTracer(nail, { x, y }, 0.58);
			drawSpark(x, y, 8, 0.9);
		}
	}

	if (phase.name === "Hairpin Bloom") {
		const ring = easeOut(progress) * 240;
		drawRing(center, ring, 1 - progress);
		for (let i = 0; i < 38; i++) {
			const angle = i * 2.399 + ms * 0.003;
			const distance = 24 + ring * (0.35 + (i % 5) * 0.07);
			drawShard(center.x + Math.cos(angle) * distance, center.y + Math.sin(angle) * distance, angle, 1 - progress);
		}
	}

	if (phase.name === "Afterglow") {
		for (let i = 0; i < 26; i++) {
			const angle = i * 1.71;
			const distance = 35 + i * 7 + progress * 80;
			drawSpark(center.x + Math.cos(angle) * distance, center.y + Math.sin(angle) * distance + progress * 32, 4, 0.5 * (1 - progress));
		}
	}
}

function drawTracer(from, to, alpha) {
	ctx.strokeStyle = `rgba(255,77,125,${alpha})`;
	ctx.lineWidth = 2;
	ctx.shadowColor = colors.crimson;
	ctx.shadowBlur = 10;
	ctx.beginPath();
	ctx.moveTo(from.x, from.y);
	ctx.lineTo(to.x, to.y);
	ctx.stroke();
	ctx.shadowBlur = 0;
}

function drawSlash(x1, y1, x2, y2, alpha) {
	ctx.strokeStyle = `rgba(248,242,234,${alpha})`;
	ctx.lineWidth = 6;
	ctx.beginPath();
	ctx.moveTo(x1, y1);
	ctx.lineTo(x2, y2);
	ctx.stroke();
}

function drawRing(center, radius, alpha) {
	ctx.strokeStyle = `rgba(248,242,234,${0.75 * alpha})`;
	ctx.lineWidth = 3;
	ctx.beginPath();
	ctx.arc(center.x, center.y, radius, 0, Math.PI * 2);
	ctx.stroke();
	ctx.strokeStyle = `rgba(215,25,63,${0.5 * alpha})`;
	ctx.lineWidth = 12;
	ctx.beginPath();
	ctx.arc(center.x, center.y, radius * 0.74, 0, Math.PI * 2);
	ctx.stroke();
}

function drawShard(x, y, angle, alpha) {
	ctx.save();
	ctx.translate(x, y);
	ctx.rotate(angle);
	ctx.fillStyle = `rgba(215,25,63,${alpha})`;
	ctx.fillRect(-10, -1, 20, 2);
	ctx.fillStyle = `rgba(248,242,234,${alpha * 0.75})`;
	ctx.fillRect(4, -1, 8, 2);
	ctx.restore();
}

function drawSpark(x, y, size, alpha) {
	ctx.fillStyle = `rgba(215,25,63,${alpha})`;
	ctx.shadowColor = colors.hotPink;
	ctx.shadowBlur = 12;
	ctx.beginPath();
	ctx.arc(x, y, size, 0, Math.PI * 2);
	ctx.fill();
	ctx.shadowBlur = 0;
}

function drawImpactFrame(width, height, phase, progress) {
	let alpha = 0;
	if (phase.name === "Hammer Snap") alpha = Math.max(0, 0.22 * (1 - progress));
	if (phase.name === "Hairpin Bloom" && progress < 0.18) alpha = 0.42 * (1 - progress / 0.18);
	if (alpha <= 0) return;
	ctx.fillStyle = `rgba(248,242,234,${alpha})`;
	ctx.fillRect(0, 0, width, height);
}

function updateLabels(phase, ms) {
	phaseLabel.textContent = phase.name;
	timeLabel.textContent = `${Math.round(ms)} ms / ${total} ms`;
	for (const segment of segments) {
		segment.classList.toggle("active", segment.dataset.phase === phase.name);
	}
}

draw();
</script>
</body>
</html>
