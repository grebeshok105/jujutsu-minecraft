<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Nobara Hairpin Visual Target</title>
	<style>
		:root {
			color-scheme: dark;
			--bg: #040102;
			--panel: #0d0709;
			--line: #2a1018;
			--text: #efe6df;
			--muted: #a98991;
			--crimson: #a90824;
			--deep-red: #3a0009;
			--hot-pink: #c3193e;
			--impact: #eadbd2;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			background: var(--bg);
			color: var(--text);
			font-family: Arial, Helvetica, sans-serif;
			letter-spacing: 0;
		}

		main {
			display: grid;
			grid-template-rows: minmax(0, 1fr) auto;
			min-height: 100vh;
		}

		.stage {
			position: relative;
			overflow: hidden;
			min-height: 420px;
			border-bottom: 1px solid var(--line);
			box-shadow: inset 0 -42px 80px rgba(0, 0, 0, 0.46);
		}

		canvas {
			display: block;
			width: 100%;
			height: 100%;
			min-height: 420px;
		}

		.status {
			position: absolute;
			left: 24px;
			bottom: 24px;
			display: grid;
			gap: 6px;
			pointer-events: none;
			text-shadow: 0 2px 18px #000;
		}

		.phase {
			font-size: 20px;
			font-weight: 700;
		}

		.time {
			color: var(--muted);
			font-size: 13px;
		}

		.controls {
			display: grid;
			grid-template-columns: auto 1fr auto;
			gap: 18px;
			align-items: center;
			padding: 16px 20px;
			background: linear-gradient(180deg, #12090d 0%, var(--panel) 100%);
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
		}

		button {
			width: 38px;
			height: 38px;
			border: 1px solid var(--line);
			background: #170b10;
			color: var(--text);
			border-radius: 6px;
			font-size: 18px;
			cursor: pointer;
			transition: border-color 140ms ease, background 140ms ease, color 140ms ease;
		}

		button:hover {
			border-color: var(--hot-pink);
			background: #211017;
		}

		.timeline {
			display: grid;
			grid-template-columns: 180fr 60fr 320fr 340fr 900fr;
			height: 16px;
			border: 1px solid var(--line);
			background: #070304;
			border-radius: 999px;
			overflow: hidden;
			box-shadow: inset 0 0 16px rgba(0, 0, 0, 0.72);
		}

		.segment {
			position: relative;
			border-right: 1px solid #26151d;
		}

		.segment:last-child {
			border-right: 0;
		}

		.segment.active::after {
			content: "";
			position: absolute;
			inset: 0;
			background: linear-gradient(90deg, var(--deep-red), var(--crimson), var(--deep-red));
			opacity: 0.5;
			transition: opacity 180ms ease;
		}

		.legend {
			display: flex;
			gap: 14px;
			flex-wrap: wrap;
			color: var(--muted);
			font-size: 12px;
			align-items: center;
		}

		.legend span::before {
			content: "";
			display: inline-block;
			width: 8px;
			height: 8px;
			margin-right: 6px;
			background: radial-gradient(circle, var(--crimson), var(--deep-red));
			border-radius: 50%;
			box-shadow: 0 0 10px rgba(169, 8, 36, 0.5);
		}

		@media (max-width: 700px) {
			.controls {
				grid-template-columns: auto 1fr;
			}

			.legend {
				grid-column: 1 / -1;
			}
		}
	</style>
</head>
<body>
<main>
	<section class="stage">
		<canvas id="scene" aria-label="Nobara Hairpin timing target"></canvas>
		<div class="status">
			<div class="phase" id="phase">Prep Freeze</div>
			<div class="time" id="time">0 ms / 1800 ms</div>
		</div>
	</section>
	<section class="controls">
		<button id="toggle" title="Play or pause">||</button>
		<div class="timeline" id="timeline">
			<div class="segment" data-phase="Prep Freeze"></div>
			<div class="segment" data-phase="Hammer Snap"></div>
			<div class="segment" data-phase="Nail Ignition"></div>
			<div class="segment" data-phase="Hairpin Bloom"></div>
			<div class="segment" data-phase="Afterglow"></div>
		</div>
		<div class="legend">
			<span>crimson core</span>
			<span>white impact</span>
			<span>red-black residue</span>
		</div>
	</section>
</main>
<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");
const phaseLabel = document.getElementById("phase");
const timeLabel = document.getElementById("time");
const toggle = document.getElementById("toggle");
const segments = [...document.querySelectorAll(".segment")];

const phases = [
	{ name: "Prep Freeze", start: 0, end: 180 },
	{ name: "Hammer Snap", start: 180, end: 240 },
	{ name: "Nail Ignition", start: 240, end: 560 },
	{ name: "Hairpin Bloom", start: 560, end: 900 },
	{ name: "Afterglow", start: 900, end: 1800 }
];
const total = 1800;
const colors = {
	crimson: "#a90824",
	deepRed: "#3a0009",
	black: "#040102",
	impact: "#eadbd2",
	hotPink: "#c3193e",
	bloodBlack: "#120006",
	soot: "#090204"
};

let running = true;
let start = performance.now();
let pausedAt = 0;

toggle.addEventListener("click", () => {
	running = !running;
	if (running) {
		start = performance.now() - pausedAt;
		toggle.textContent = "||";
	} else {
		pausedAt = elapsed();
		toggle.textContent = ">";
	}
});

function elapsed() {
	if (!running) return pausedAt;
	return (performance.now() - start) % total;
}

function resize() {
	const rect = canvas.getBoundingClientRect();
	const ratio = window.devicePixelRatio || 1;
	canvas.width = Math.max(1, Math.floor(rect.width * ratio));
	canvas.height = Math.max(1, Math.floor(rect.height * ratio));
	ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
}

window.addEventListener("resize", resize);
resize();

function currentPhase(ms) {
	return phases.find(phase => ms >= phase.start && ms < phase.end) || phases[phases.length - 1];
}

function phaseProgress(phase, ms) {
	return Math.max(0, Math.min(1, (ms - phase.start) / (phase.end - phase.start)));
}

function easeOut(value) {
	return 1 - Math.pow(1 - value, 3);
}

function easeInOut(value) {
	return value < 0.5 ? 2 * value * value : 1 - Math.pow(-2 * value + 2, 2) / 2;
}

function nailPoint(center, x, y) {
	return { x: center.x + x, y: center.y + y };
}

function draw() {
	const ms = elapsed();
	const phase = currentPhase(ms);
	const p = phaseProgress(phase, ms);
	const width = canvas.clientWidth;
	const height = canvas.clientHeight;
	const center = { x: width * 0.58, y: height * 0.5 };
	const nails = [
		nailPoint(center, -132, -76),
		nailPoint(center, 132, -76),
		nailPoint(center, -132, 76),
		nailPoint(center, 132, 76)
	].map(nail => ({ ...nail, angle: Math.atan2(center.y - nail.y, center.x - nail.x) }));

	ctx.clearRect(0, 0, width, height);
	drawBackground(width, height, ms);
	drawNails(nails, center, phase, p);
	drawPhaseEffect(nails, center, phase, p, ms);
	drawImpactFrame(width, height, phase, p);
	updateLabels(phase, ms);
	requestAnimationFrame(draw);
}

function drawBackground(width, height, ms) {
	const gradient = ctx.createRadialGradient(width * 0.58, height * 0.5, 10, width * 0.58, height * 0.5, Math.max(width, height) * 0.7);
	gradient.addColorStop(0, "#170006");
	gradient.addColorStop(0.5, "#090204");
	gradient.addColorStop(1, colors.black);
	ctx.fillStyle = gradient;
	ctx.fillRect(0, 0, width, height);

	ctx.strokeStyle = "rgba(104,0,18,0.12)";
	ctx.lineWidth = 1;
	for (let i = 0; i < 18; i++) {
		const y = (height * 0.18) + i * 28 + Math.sin(ms * 0.002 + i) * 4;
		ctx.beginPath();
		ctx.moveTo(0, y);
		ctx.lineTo(width, y - 80);
		ctx.stroke();
	}
}

function drawNails(nails, center, phase, progress) {
	for (const nail of nails) {
		const charged = phase.name !== "Prep Freeze" || progress > 0.35;
		ctx.save();
		ctx.translate(nail.x, nail.y);
		ctx.rotate(nail.angle);
		ctx.fillStyle = "#b7a5a6";
		ctx.fillRect(-24, -1.5, 48, 3);
		ctx.fillStyle = "#2a2021";
		ctx.fillRect(-27, -3, 10, 6);
		ctx.fillStyle = "#d2c0bd";
		ctx.beginPath();
		ctx.moveTo(25, 0);
		ctx.lineTo(18, -3);
		ctx.lineTo(18, 3);
		ctx.closePath();
		ctx.fill();
		if (charged) {
			ctx.shadowColor = colors.crimson;
			ctx.shadowBlur = 14;
			ctx.fillStyle = colors.crimson;
			ctx.fillRect(-16, -2.5, 30, 5);
		}
		ctx.restore();
	}
}

function drawPhaseEffect(nails, center, phase, progress, ms) {
	if (phase.name === "Prep Freeze") {
		const pull = easeOut(progress) * 18;
		for (const nail of nails) drawSpark(nail.x + (center.x - nail.x) * 0.03, nail.y + (center.y - nail.y) * 0.03, 5 + pull * 0.08, 0.45);
	}

	if (phase.name === "Hammer Snap") {
		drawSlash(center.x - 230, center.y - 120, center.x - 80, center.y - 20, 1 - progress);
	}

	if (phase.name === "Nail Ignition") {
		for (const nail of nails) {
			const x = nail.x + (center.x - nail.x) * progress;
			const y = nail.y + (center.y - nail.y) * progress;
			drawTracer(nail, { x, y }, 0.58);
			drawSpark(x, y, 8, 0.9);
		}
	}

	if (phase.name === "Hairpin Bloom") {
		const ring = easeOut(progress) * 240;
		const residue = 0.55 - progress * 0.3;
		drawRing(center, ring, Math.max(0.18, 1 - progress * 0.72));
		drawBloomResidue(center, ring, residue, ms, Math.max(0.35, progress));
		drawBloomShards(center, progress, 1.0, ms);
	}

	if (phase.name === "Afterglow") {
		const fade = 1 - easeOut(progress);
		const carriedRing = 238 + easeInOut(progress) * 38;
		drawBloomResidue(center, carriedRing, 0.34 * fade, ms, 1 + progress * 0.35);
		drawBloomShards(center, 1 + progress * 0.38, 0.48 * fade, ms);
	}
}

function drawTracer(from, to, alpha) {
	ctx.strokeStyle = `rgba(169,8,36,${alpha})`;
	ctx.lineWidth = 2;
	ctx.shadowColor = colors.crimson;
	ctx.shadowBlur = 8;
	ctx.beginPath();
	ctx.moveTo(from.x, from.y);
	ctx.lineTo(to.x, to.y);
	ctx.stroke();
	ctx.shadowBlur = 0;
}

function drawSlash(x1, y1, x2, y2, alpha) {
	ctx.strokeStyle = `rgba(234,219,210,${alpha})`;
	ctx.lineWidth = 6;
	ctx.beginPath();
	ctx.moveTo(x1, y1);
	ctx.lineTo(x2, y2);
	ctx.stroke();
}

function drawRing(center, radius, alpha) {
	ctx.strokeStyle = `rgba(234,219,210,${0.55 * alpha})`;
	ctx.lineWidth = 3;
	ctx.beginPath();
	ctx.arc(center.x, center.y, radius, 0, Math.PI * 2);
	ctx.stroke();
	ctx.strokeStyle = `rgba(104,0,18,${0.58 * alpha})`;
	ctx.lineWidth = 12;
	ctx.beginPath();
	ctx.arc(center.x, center.y, radius * 0.74, 0, Math.PI * 2);
	ctx.stroke();
}

function drawBloomResidue(center, radius, alpha, ms, spread) {
	if (alpha <= 0) return;
	ctx.save();
	ctx.globalCompositeOperation = "lighter";
	ctx.strokeStyle = `rgba(58,0,9,${alpha})`;
	ctx.lineWidth = 14;
	ctx.beginPath();
	ctx.arc(center.x, center.y, radius * 0.82, 0, Math.PI * 2);
	ctx.stroke();
	ctx.strokeStyle = `rgba(169,8,36,${alpha * 0.42})`;
	ctx.lineWidth = 2;
	for (let i = 0; i < 18; i++) {
		const angle = i * 0.82 + Math.sin(ms * 0.001 + i) * 0.04;
		const inner = radius * (0.38 + (i % 4) * 0.055) * spread;
		const outer = radius * (0.72 + (i % 5) * 0.032) * spread;
		ctx.beginPath();
		ctx.moveTo(center.x + Math.cos(angle) * inner, center.y + Math.sin(angle) * inner);
		ctx.lineTo(center.x + Math.cos(angle) * outer, center.y + Math.sin(angle) * outer);
		ctx.stroke();
	}
	ctx.restore();
}

function drawBloomShards(center, spread, alpha, ms) {
	if (alpha <= 0) return;
	for (let i = 0; i < 42; i++) {
		const angle = i * 2.399 + 0.18 + Math.sin(ms * 0.001 + i) * 0.025;
		const base = 52 + (i % 7) * 18;
		const distance = base + spread * (80 + (i % 5) * 20);
		const fall = Math.max(0, spread - 1) * (24 + (i % 6) * 8);
		const x = center.x + Math.cos(angle) * distance;
		const y = center.y + Math.sin(angle) * distance + fall;
		drawShard(x, y, angle, alpha * (0.62 + (i % 4) * 0.08));
	}
}

function drawShard(x, y, angle, alpha) {
	ctx.save();
	ctx.translate(x, y);
	ctx.rotate(angle);
	ctx.fillStyle = `rgba(169,8,36,${alpha})`;
	ctx.fillRect(-10, -1, 20, 2);
	ctx.fillStyle = `rgba(234,219,210,${alpha * 0.55})`;
	ctx.fillRect(4, -1, 8, 2);
	ctx.restore();
}

function drawSpark(x, y, size, alpha) {
	ctx.fillStyle = `rgba(169,8,36,${alpha})`;
	ctx.shadowColor = colors.crimson;
	ctx.shadowBlur = 10;
	ctx.beginPath();
	ctx.arc(x, y, size, 0, Math.PI * 2);
	ctx.fill();
	ctx.shadowBlur = 0;
}

function drawImpactFrame(width, height, phase, progress) {
	let alpha = 0;
	if (phase.name === "Hammer Snap") alpha = Math.max(0, 0.22 * (1 - progress));
	if (phase.name === "Hairpin Bloom" && progress < 0.18) alpha = 0.32 * (1 - progress / 0.18);
	if (alpha <= 0) return;
	ctx.fillStyle = `rgba(234,219,210,${alpha})`;
	ctx.fillRect(0, 0, width, height);
}

function updateLabels(phase, ms) {
	phaseLabel.textContent = phase.name;
	timeLabel.textContent = `${Math.round(ms)} ms / ${total} ms`;
	for (const segment of segments) {
		segment.classList.toggle("active", segment.dataset.phase === phase.name);
	}
}

draw();
</script>
</body>
</html>
