<!doctype html>
<html lang="en" data-document-status="historical">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Nobara Hairpin Visual Target</title>
	<style>
		:root {
			color-scheme: dark;
			--bg: #020101;
			--panel: #0a0506;
			--panel-hi: #13080b;
			--line: #2a0b12;
			--line-hot: #5d0715;
			--text: #eee5dc;
			--muted: #a48187;
			--blood: #4b000d;
			--blood-hot: #650214;
			--fuchsia: #7f1230;
			--metal: #b8aaa5;
			--impact: #f1ded3;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			background: var(--bg);
			color: var(--text);
			font-family: Arial, Helvetica, sans-serif;
			letter-spacing: 0;
		}

		main {
			display: grid;
			grid-template-rows: minmax(0, 1fr) auto;
			min-height: 100vh;
		}

		.stage {
			position: relative;
			overflow: hidden;
			min-height: 430px;
			border-bottom: 1px solid var(--line);
			background: #020101;
		}

		canvas {
			display: block;
			width: 100%;
			height: 100%;
			min-height: 430px;
		}

		.status {
			position: absolute;
			left: 24px;
			bottom: 22px;
			display: grid;
			gap: 6px;
			pointer-events: none;
			text-shadow: 0 2px 18px #000;
		}

		.phase {
			font-size: 20px;
			font-weight: 700;
		}

		.time {
			color: var(--muted);
			font-size: 13px;
		}

		.controls {
			display: grid;
			grid-template-columns: auto minmax(180px, 1fr) auto;
			gap: 16px;
			align-items: center;
			padding: 14px 18px;
			background: linear-gradient(180deg, var(--panel-hi) 0%, var(--panel) 100%);
			box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
		}

		button {
			width: 38px;
			height: 38px;
			border: 1px solid var(--line);
			background: #12080a;
			color: var(--text);
			border-radius: 6px;
			font-size: 16px;
			cursor: pointer;
			transition: border-color 140ms ease, background 140ms ease, color 140ms ease;
		}

		button:hover {
			border-color: var(--line-hot);
			background: #1a0a0e;
		}

		.timeline {
			position: relative;
			display: grid;
			grid-template-columns: 180fr 60fr 320fr 340fr 900fr;
			height: 16px;
			border: 1px solid var(--line);
			background: #050202;
			border-radius: 999px;
			overflow: hidden;
			box-shadow: inset 0 0 16px rgba(0, 0, 0, 0.72);
		}

		.progress {
			position: absolute;
			inset: 0 auto 0 0;
			width: 0%;
			background: linear-gradient(90deg, #210006, var(--blood), var(--blood-hot));
			opacity: 0.72;
			pointer-events: none;
		}

		.segment {
			position: relative;
			z-index: 1;
			border-right: 1px solid #231016;
		}

		.segment:last-child {
			border-right: 0;
		}

		.readout {
			min-width: 126px;
			color: var(--muted);
			font-size: 12px;
			text-align: right;
		}

		@media (max-width: 700px) {
			.controls {
				grid-template-columns: auto 1fr;
			}

			.readout {
				grid-column: 1 / -1;
				text-align: left;
			}
		}
	</style>
</head>
<body>
<main>
	<section class="stage">
		<canvas id="scene" aria-label="Nobara Hairpin visual target"></canvas>
		<div class="status">
			<div class="phase" id="phase">Marked Nails</div>
			<div class="time" id="time">0 ms / 1800 ms</div>
		</div>
	</section>
	<section class="controls">
		<button id="toggle" title="Play or pause">II</button>
		<div class="timeline" id="timeline">
			<div class="progress" id="progress"></div>
			<div class="segment" data-phase="Marked Nails"></div>
			<div class="segment" data-phase="Trigger Ping"></div>
			<div class="segment" data-phase="Cursed Compression"></div>
			<div class="segment" data-phase="Hairpin Snap"></div>
			<div class="segment" data-phase="Blood-Black Residue"></div>
		</div>
		<div class="readout" id="readout">anchors: 4</div>
	</section>
</main>
<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");
const phaseLabel = document.getElementById("phase");
const timeLabel = document.getElementById("time");
const readout = document.getElementById("readout");
const progressEl = document.getElementById("progress");
const toggle = document.getElementById("toggle");

const phases = [
	{ name: "Marked Nails", start: 0, end: 180 },
	{ name: "Trigger Ping", start: 180, end: 240 },
	{ name: "Cursed Compression", start: 240, end: 560 },
	{ name: "Hairpin Snap", start: 560, end: 900 },
	{ name: "Blood-Black Residue", start: 900, end: 1800 }
];

const total = 1800;
const colors = {
	bg: "#020101",
	soot: "#070202",
	bloodBlack: "#120005",
	deepBlood: "#2d0008",
	blood: "#4b000d",
	crimson: "#650214",
	fuchsia: "#7f1230",
	metal: "#b8aaa5",
	metalDark: "#33292a",
	impact: "#f1ded3"
};

let running = true;
let start = performance.now();
let pausedAt = 0;
const params = new URLSearchParams(window.location.search);
const requestedTime = Number(params.get("t"));
if (params.has("t") && Number.isFinite(requestedTime)) {
	running = false;
	pausedAt = ((requestedTime % total) + total) % total;
}
toggle.textContent = running ? "II" : ">";

toggle.addEventListener("click", () => {
	running = !running;
	if (running) {
		start = performance.now() - pausedAt;
		toggle.textContent = "II";
	} else {
		pausedAt = elapsed();
		toggle.textContent = ">";
	}
});

document.getElementById("timeline").addEventListener("click", event => {
	const rect = event.currentTarget.getBoundingClientRect();
	pausedAt = clamp((event.clientX - rect.left) / rect.width) * total;
	running = false;
	toggle.textContent = ">";
});

function elapsed() {
	if (!running) return pausedAt;
	return (performance.now() - start) % total;
}

function resize() {
	const rect = canvas.getBoundingClientRect();
	const ratio = window.devicePixelRatio || 1;
	canvas.width = Math.max(1, Math.floor(rect.width * ratio));
	canvas.height = Math.max(1, Math.floor(rect.height * ratio));
	ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
}

window.addEventListener("resize", resize);
resize();

function clamp(value, min = 0, max = 1) {
	return Math.max(min, Math.min(max, value));
}

function smoothstep(value) {
	const v = clamp(value);
	return v * v * (3 - 2 * v);
}

function easeOut(value) {
	return 1 - Math.pow(1 - clamp(value), 3);
}

function pulse(ms, startMs, endMs) {
	const v = clamp((ms - startMs) / (endMs - startMs));
	return Math.sin(v * Math.PI);
}

function currentPhase(ms) {
	return phases.find(phase => ms >= phase.start && ms < phase.end) || phases[phases.length - 1];
}

function buildState(ms) {
	return {
		mark: clamp(ms / 180),
		trigger: pulse(ms, 180, 240),
		compress: smoothstep((ms - 240) / 320),
		burst: pulse(ms, 560, 900),
		burstOut: easeOut((ms - 560) / 340),
		residue: 1 - smoothstep((ms - 900) / 900),
		after: smoothstep((ms - 900) / 900)
	};
}

function makeNails(center, scale) {
	const spots = [
		{ x: -150, y: -86, side: -1 },
		{ x: 132, y: -78, side: 1 },
		{ x: -128, y: 92, side: -1 },
		{ x: 150, y: 78, side: 1 }
	];
	return spots.map((spot, index) => {
		const x = center.x + spot.x * scale;
		const y = center.y + spot.y * scale;
		const toCenter = Math.atan2(center.y - y, center.x - x);
		return {
			x,
			y,
			index,
			angle: toCenter + spot.side * 0.09,
			toCenter,
			length: (50 + index * 4) * scale,
			surface: 34 * scale
		};
	});
}

function draw() {
	const ms = elapsed();
	const phase = currentPhase(ms);
	const state = buildState(ms);
	const width = canvas.clientWidth;
	const height = canvas.clientHeight;
	const scale = clamp(Math.min(width / 920, height / 560), 0.68, 1.18);
	const center = { x: width * 0.56, y: height * 0.49 };
	const nails = makeNails(center, scale);

	ctx.clearRect(0, 0, width, height);
	drawBackground(width, height, center, state, ms);
	drawTarget(center, scale, state);
	drawAnchors(nails, center, scale, state, ms);
	drawEnergy(nails, center, scale, state, ms);
	drawImpactFrame(width, height, state);
	updateLabels(phase, ms, state);
	requestAnimationFrame(draw);
}

function drawBackground(width, height, center, state, ms) {
	const glow = 0.18 + state.compress * 0.18 + state.burst * 0.28;
	const gradient = ctx.createRadialGradient(center.x, center.y, 8, center.x, center.y, Math.max(width, height) * 0.72);
	gradient.addColorStop(0, `rgba(75,0,13,${glow})`);
	gradient.addColorStop(0.34, colors.soot);
	gradient.addColorStop(1, colors.bg);
	ctx.fillStyle = gradient;
	ctx.fillRect(0, 0, width, height);

	ctx.strokeStyle = "rgba(95, 8, 22, 0.11)";
	ctx.lineWidth = 1;
	for (let i = 0; i < 16; i++) {
		const y = height * 0.16 + i * 32 + Math.sin(ms * 0.0015 + i) * 2;
		ctx.beginPath();
		ctx.moveTo(width * -0.08, y);
		ctx.lineTo(width * 1.08, y - height * 0.12);
		ctx.stroke();
	}

	ctx.fillStyle = "rgba(0, 0, 0, 0.24)";
	ctx.fillRect(0, height * 0.72, width, height * 0.28);
}

function drawTarget(center, scale, state) {
	const wake = state.compress * 0.7 + state.burst + state.residue * 0.18;
	ctx.save();
	ctx.translate(center.x, center.y);

	ctx.strokeStyle = `rgba(241,222,211,${0.08 + wake * 0.12})`;
	ctx.lineWidth = 1.5 * scale;
	for (let i = 0; i < 7; i++) {
		const angle = -0.82 + i * 0.28;
		const inner = (26 + i * 2) * scale;
		const outer = (88 + i * 9) * scale;
		ctx.beginPath();
		ctx.moveTo(Math.cos(angle) * inner, Math.sin(angle) * inner);
		ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
		ctx.stroke();
	}

	const core = ctx.createRadialGradient(0, 0, 0, 0, 0, 84 * scale);
	core.addColorStop(0, `rgba(101,2,20,${0.14 + wake * 0.14})`);
	core.addColorStop(0.46, `rgba(45,0,8,${0.24 + wake * 0.2})`);
	core.addColorStop(1, "rgba(0,0,0,0)");
	ctx.fillStyle = core;
	ctx.beginPath();
	ctx.arc(0, 0, 88 * scale, 0, Math.PI * 2);
	ctx.fill();
	ctx.restore();
}

function drawAnchors(nails, center, scale, state, ms) {
	for (const nail of nails) {
		drawEmbeddedSurface(nail, scale, state);
		drawNail(nail, scale, state, ms);
	}
}

function drawEmbeddedSurface(nail, scale, state) {
	ctx.save();
	ctx.translate(nail.x, nail.y);
	ctx.rotate(nail.angle + Math.PI / 2);
	ctx.strokeStyle = `rgba(82, 12, 20, ${0.38 + state.compress * 0.24})`;
	ctx.lineWidth = 2 * scale;
	ctx.beginPath();
	ctx.moveTo(-nail.surface, 0);
	ctx.lineTo(nail.surface, 0);
	ctx.stroke();

	ctx.strokeStyle = `rgba(241,222,211,${0.1 + state.burst * 0.18})`;
	ctx.lineWidth = 1 * scale;
	for (let i = -2; i <= 2; i++) {
		const offset = i * 8 * scale;
		ctx.beginPath();
		ctx.moveTo(offset, 0);
		ctx.lineTo(offset + i * 5 * scale, 13 * scale);
		ctx.stroke();
	}
	ctx.restore();
}

function drawNail(nail, scale, state, ms) {
	const vibration = Math.sin(ms * 0.05 + nail.index * 1.7) * (state.compress * 1.4 + state.trigger * 2.2) * scale;
	const charge = 0.2 + state.mark * 0.35 + state.compress * 0.45 + state.burst * 0.6;
	ctx.save();
	ctx.translate(nail.x + vibration, nail.y - vibration * 0.35);
	ctx.rotate(nail.angle);

	ctx.shadowColor = colors.crimson;
		ctx.shadowBlur = 12 * charge;
	ctx.fillStyle = colors.metalDark;
	ctx.fillRect(-nail.length * 0.56, -3.2 * scale, 14 * scale, 6.4 * scale);
	ctx.fillStyle = colors.metal;
	ctx.fillRect(-nail.length * 0.46, -1.8 * scale, nail.length * 0.82, 3.6 * scale);
	ctx.fillStyle = colors.impact;
	ctx.beginPath();
	ctx.moveTo(nail.length * 0.44, 0);
	ctx.lineTo(nail.length * 0.28, -4.5 * scale);
	ctx.lineTo(nail.length * 0.28, 4.5 * scale);
	ctx.closePath();
	ctx.fill();

	ctx.fillStyle = `rgba(101,2,20,${charge})`;
	ctx.fillRect(-nail.length * 0.24, -2.7 * scale, nail.length * 0.52, 5.4 * scale);
	ctx.restore();
}

function drawEnergy(nails, center, scale, state, ms) {
	drawCompressionThreads(nails, center, scale, state, ms);
	drawSnapSpikes(nails, center, scale, state, ms);
	drawResidue(nails, center, scale, state, ms);
}

function drawCompressionThreads(nails, center, scale, state, ms) {
	const alpha = clamp(state.compress * 0.76 + state.trigger * 0.6 + state.burst * 0.42 + state.residue * 0.12);
	if (alpha <= 0.01) return;
	ctx.save();
	ctx.globalCompositeOperation = "source-over";
	for (const nail of nails) {
		const wobble = Math.sin(ms * 0.004 + nail.index) * 10 * scale;
		const pull = state.compress * 0.24 + state.burstOut * 0.42;
		const cx = nail.x + (center.x - nail.x) * (0.48 + pull);
		const cy = nail.y + (center.y - nail.y) * (0.48 + pull) + wobble;
		ctx.strokeStyle = `rgba(45,0,8,${alpha * 0.92})`;
		ctx.lineWidth = (5.5 + state.compress * 3.2) * scale;
		ctx.beginPath();
		ctx.moveTo(nail.x, nail.y);
		ctx.quadraticCurveTo(cx, cy, center.x, center.y);
		ctx.stroke();

		ctx.strokeStyle = `rgba(101,2,20,${alpha * 0.7})`;
		ctx.lineWidth = (1.8 + state.compress * 1.5) * scale;
		ctx.shadowColor = colors.crimson;
		ctx.shadowBlur = 8 * alpha;
		ctx.beginPath();
		ctx.moveTo(nail.x, nail.y);
		ctx.quadraticCurveTo(cx, cy, center.x, center.y);
		ctx.stroke();

		ctx.strokeStyle = `rgba(241,222,211,${alpha * 0.1})`;
		ctx.lineWidth = 1 * scale;
		ctx.beginPath();
		ctx.moveTo(nail.x, nail.y);
		ctx.quadraticCurveTo(cx - wobble * 0.4, cy + wobble * 0.2, center.x, center.y);
		ctx.stroke();
	}
	ctx.restore();
}

function drawSnapSpikes(nails, center, scale, state, ms) {
	const alpha = clamp(state.burst * 1.15 + state.residue * 0.34);
	if (alpha <= 0.01) return;
	ctx.save();
	ctx.globalCompositeOperation = "source-over";
	for (const nail of nails) {
		const dx = center.x - nail.x;
		const dy = center.y - nail.y;
		const angle = Math.atan2(dy, dx);
		const length = (110 + state.burstOut * 122 + state.after * 30) * scale;
		const width = (22 + state.burst * 22) * scale;
		const origin = {
			x: nail.x + Math.cos(angle) * 12 * scale,
			y: nail.y + Math.sin(angle) * 12 * scale
		};
		drawSpike(origin, angle, length, width, alpha, nail.index);
	}
	drawCoreSnap(center, scale, state);
	ctx.restore();
}

function drawSpike(origin, angle, length, width, alpha, index) {
	ctx.save();
	ctx.translate(origin.x, origin.y);
	ctx.rotate(angle);
	ctx.shadowColor = colors.crimson;
	ctx.shadowBlur = 10 * alpha;

	const grad = ctx.createLinearGradient(0, 0, length, 0);
	grad.addColorStop(0, `rgba(18,0,5,${alpha})`);
	grad.addColorStop(0.52, `rgba(75,0,13,${alpha * 0.95})`);
	grad.addColorStop(0.82, `rgba(101,2,20,${alpha * 0.64})`);
	grad.addColorStop(1, `rgba(241,222,211,${alpha * 0.07})`);
	ctx.fillStyle = grad;
	ctx.beginPath();
	ctx.moveTo(-10, -width * 0.28);
	ctx.lineTo(length * 0.74, -width);
	ctx.lineTo(length, 0);
	ctx.lineTo(length * 0.74, width * 0.72);
	ctx.lineTo(-10, width * 0.22);
	ctx.closePath();
	ctx.fill();

	ctx.strokeStyle = `rgba(241,222,211,${alpha * 0.2})`;
	ctx.lineWidth = 1;
	ctx.beginPath();
	ctx.moveTo(length * 0.04, 0);
	ctx.lineTo(length * (0.78 + (index % 2) * 0.06), 0);
	ctx.stroke();
	ctx.restore();
}

function drawCoreSnap(center, scale, state) {
	const radius = (32 + state.burstOut * 44) * scale;
	const alpha = state.burst * 0.32 + state.residue * 0.06;
	ctx.save();
	ctx.lineCap = "butt";
	for (let i = 0; i < 9; i++) {
		const start = i * 0.72 + state.after * 0.16;
		const end = start + 0.18 + (i % 3) * 0.05;
		ctx.strokeStyle = `rgba(75,0,13,${alpha * 1.25})`;
		ctx.lineWidth = (7 + (i % 3) * 2) * scale;
		ctx.beginPath();
		ctx.arc(center.x, center.y, radius * (0.84 + (i % 2) * 0.28), start, end);
		ctx.stroke();
		ctx.strokeStyle = `rgba(241,222,211,${alpha * 0.28})`;
		ctx.lineWidth = 1 * scale;
		ctx.beginPath();
		ctx.arc(center.x, center.y, radius * (0.72 + (i % 2) * 0.24), start + 0.04, end + 0.02);
		ctx.stroke();
	}
	ctx.restore();
}

function drawResidue(nails, center, scale, state, ms) {
	const alpha = clamp(state.burst * 0.42 + state.residue * 0.72);
	if (alpha <= 0.01) return;
	for (const nail of nails) {
		for (let i = 0; i < 14; i++) {
			const seed = (i + 1) * 12.989 + nail.index * 78.233;
			const direction = nail.toCenter + Math.sin(seed) * 0.92;
			const drift = (28 + (i % 5) * 18 + state.after * (42 + i * 2)) * scale;
			const fall = state.after * state.after * (14 + (i % 4) * 8) * scale;
			const x = nail.x + Math.cos(direction) * drift;
			const y = nail.y + Math.sin(direction) * drift + fall;
			const size = (8 + (i % 4) * 3) * scale;
			drawResidueShard(x, y, direction, size, alpha * (0.28 + (i % 3) * 0.11));
		}
	}
}

function drawResidueShard(x, y, angle, size, alpha) {
	ctx.save();
	ctx.translate(x, y);
	ctx.rotate(angle);
	ctx.fillStyle = `rgba(75,0,13,${alpha})`;
	ctx.fillRect(-size * 0.5, -1.5, size, 3);
	ctx.fillStyle = `rgba(127,18,48,${alpha * 0.3})`;
	ctx.fillRect(size * 0.08, -1, size * 0.38, 2);
	ctx.restore();
}

function drawImpactFrame(width, height, state) {
	const alpha = state.trigger * 0.1 + state.burst * 0.18;
	if (alpha <= 0.01) return;
	const gradient = ctx.createRadialGradient(width * 0.56, height * 0.49, 10, width * 0.56, height * 0.49, Math.max(width, height) * 0.58);
	gradient.addColorStop(0, `rgba(241,222,211,${alpha * 0.28})`);
	gradient.addColorStop(0.5, `rgba(75,0,13,${alpha})`);
	gradient.addColorStop(1, "rgba(0,0,0,0)");
	ctx.fillStyle = gradient;
	ctx.fillRect(0, 0, width, height);
}

function updateLabels(phase, ms, state) {
	phaseLabel.textContent = phase.name;
	timeLabel.textContent = `${Math.round(ms)} ms / ${total} ms`;
	progressEl.style.width = `${(ms / total) * 100}%`;
	readout.textContent = state.burst > 0.2 ? "snap: live" : state.after > 0.1 ? "residue: fading" : state.compress > 0.2 ? "anchors: armed" : "anchors: 4";
}

draw();
</script>
</body>
</html>
